name: Persistent Runner Loop

on:
  push:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-runner]

permissions:
  contents: write
  actions: write

jobs:
  runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Restore small state only
      - name: Restore State
        run: |
          if [ -f state.tar.gz ]; then
            echo "Restoring state..."
            tar -xzf state.tar.gz || true
          else
            echo "No state found"
          fi

      # Optional: your tool setup (safe)
      - name: Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --ssh --hostname=gh-node || true

      # Your "active session"
      - name: Active Session
        run: |
          echo "Running..."
          sleep 1800   # 30 min (safe vs 5h kill risk)

      # Save minimal state only
      - name: Save State
        if: always()
        run: |
          mkdir -p state
          
          # Example state (customize this)
          echo "$(date)" > state/last_run.txt

          tar -czf state.tar.gz state

      # Commit safely (only if changed)
      - name: Commit State
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.tar.gz

          if ! git diff --cached --quiet; then
            git commit -m "State update: $(date +'%Y-%m-%d %H:%M:%S')"
          else
            echo "No changes"
          fi

      # Push with retry (prevents random failure)
      - name: Push Changes
        if: always()
        run: |
          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref }} && break
            echo "Retry $i..."
            sleep 5
          done

      # Restart loop
      - name: Restart Runner
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart-runner"}'

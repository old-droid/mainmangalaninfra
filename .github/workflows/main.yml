name: Perpetual Total System Runner
on: 
  push:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-runner]

permissions:
  contents: write
  actions: write 

jobs:
  terminal-session:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Import and Restore System
        run: |
          # 1. Reassemble chunks if they exist
          if ls system_backup.tar.gz.part_* 1> /dev/null 2>&1; then
            echo "Reassembling system backup..."
            cat system_backup.tar.gz.part_* > system_backup.tar.gz
            
            # 2. Extract (Unzip) to Root /
            echo "Restoring system state to root..."
            # We use --overwrite and ignore errors for protected system files
            sudo tar -xzf system_backup.tar.gz -C / --overwrite || true
            
            # Clean up the large zip to save disk space for work
            rm system_backup.tar.gz
          else
            echo "No previous system backup found. Starting fresh."
          fi

      - name: Install and Up Tailscale
        run: |
          # Re-installing Tailscale ensures the binary is fresh even if the backup was old
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --ssh --hostname=gh-ultra-node

      - name: Active Session
        # 5 hours of work time
        run: sleep 18000 

      - name: Backup, Chunk, and Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Zipping entire filesystem..."
          # Archive the root, excluding temp/virtual/repo files
          sudo tar -czf system_backup.tar.gz / \
            --exclude=/system_backup.tar.gz \
            --exclude=/proc --exclude=/sys --exclude=/dev --exclude=/run \
            --exclude=/boot --exclude=/lost+found --exclude=/media --exclude=/mnt \
            --exclude=/var/lib/docker \
            --exclude=${{ github.workspace }} \
            --one-file-system || true

          # 3. Chunking for GitHub's 100MB limit
          echo "Chunking for export..."
          split -b 90M system_backup.tar.gz system_backup.tar.gz.part_
          rm system_backup.tar.gz

          # 4. Push back to Repo
          git add system_backup.tar.gz.part_*
          git commit -m "Total System State: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref }} --force

          # 5. Trigger Restart
          curl -X POST -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}/dispatches \
               -d '{"event_type": "restart-runner"}'
